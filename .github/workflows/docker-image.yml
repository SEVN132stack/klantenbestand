name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build ./backend -t sevn231/clientenbestand:latest
    - name: docker login
      run:
        docker login -u sevn231 -p ${{ secrets.DOCKER_HUB_TOKEN }}
    - name:  push image to docker hub
        docker push sevn231/clientenbestand:latest
